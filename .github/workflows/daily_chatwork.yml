name: Daily Chatwork Report

on:
  schedule:
    # 毎日 JST 7:00 = UTC 22:00 (前日)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '対象日（YYYY-MM-DD）空欄で前日'
        required: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Send Chatwork report
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          RAKUTEN_SERVICE_SECRET_1: ${{ secrets.RAKUTEN_SERVICE_SECRET_1 }}
          RAKUTEN_LICENSE_KEY_1: ${{ secrets.RAKUTEN_LICENSE_KEY_1 }}
          RAKUTEN_SHOP_NAME_1: ${{ secrets.RAKUTEN_SHOP_NAME_1 }}
          RAKUTEN_SERVICE_SECRET_2: ${{ secrets.RAKUTEN_SERVICE_SECRET_2 }}
          RAKUTEN_LICENSE_KEY_2: ${{ secrets.RAKUTEN_LICENSE_KEY_2 }}
          RAKUTEN_SHOP_NAME_2: ${{ secrets.RAKUTEN_SHOP_NAME_2 }}
          RAKUTEN_SERVICE_SECRET_3: ${{ secrets.RAKUTEN_SERVICE_SECRET_3 }}
          RAKUTEN_LICENSE_KEY_3: ${{ secrets.RAKUTEN_LICENSE_KEY_3 }}
          RAKUTEN_SHOP_NAME_3: ${{ secrets.RAKUTEN_SHOP_NAME_3 }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.chatwork --send-now --date "${{ github.event.inputs.date }}"
          else
            python -m src.chatwork --send-now
          fi
